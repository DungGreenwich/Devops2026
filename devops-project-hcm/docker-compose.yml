# ===========================================
# STUDENT TODO: Complete this Docker Compose file
# ===========================================
#
# Requirements:
# 1. Frontend service:
#    - Build from ./frontend directory
#    - Expose port 3000
#    - Should depend on backend
#
# 2. Backend service:
#    - Build from ./backend directory
#    - Expose port 8080
#    - Must have environment variables for database connection
#    - Should depend on postgres and wait for it to be healthy
#    - Add a healthcheck
#
# 3. Postgres service:
#    - Use postgres:15-alpine image
#    - Set POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#    - Use a named volume for data persistence
#    - Mount the init script from ./database/database.sql
#    - Add a healthcheck
#
# 4. Define named volumes
#
# Hints:
# - Research: "docker-compose healthcheck"
# - Research: "docker-compose depends_on condition"
# - Database env vars: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#
# Example healthcheck:
#   healthcheck:
#      test: ['CMD-SHELL', 'pg_isready -U postgres']
#      interval: 10s
#      timeout: 5s
#      retries: 5
# ===========================================

version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000" # map localhost:3000 to container port 3000
    depends_on:
      backend:
        condition: service_healthy # backend container must run and its healthcheck succeeded

  backend:
    build: ./backend
    healthcheck: # Healthcheck: check if the backend is running by failing if request returns error status
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "8080:8080" # map localhost:8080 to container port 8080
    environment:
      DATABASE_URL: postgres://myuser:mypass@db:5432/mydb # environment containing user, pass, host (service name), port and db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
    ports:
      - "5432:5432" # map localhost 5432 with container 5432
    volumes:
      - db_data:/var/lib/postgresql/data   # Named volume used here for persist data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"] # run in a shell
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db_data: